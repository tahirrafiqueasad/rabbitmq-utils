# disables non-TLS listeners, only TLS-enabled clients will be able to connect
listeners.tcp = none


## ========== AMQP over TLS (port 5671) ==========
listeners.ssl.default = 5671

ssl_options.cacertfile = /certs/ca.crt
ssl_options.certfile   = /certs/server.crt
ssl_options.keyfile    = /certs/server.key

# ssl_options.verify     = verify_none
ssl_options.verify     = verify_peer

ssl_options.fail_if_no_peer_cert = false
# ssl_options.fail_if_no_peer_cert = true



## ========== Management UI over TLS (port 15671) ==========
management.ssl.port = 15671
management.ssl.cacertfile = /certs/management_ca.crt
management.ssl.certfile = /certs/management_server.crt
management.ssl.keyfile = /certs/management_server.key
